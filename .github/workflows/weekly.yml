name: Threads 週一熱榜

on:
  schedule:
    # 週一 01:00 UTC = 09:00 GMT+8（台北時間）
    - cron: '0 1 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式'
        required: false
        default: 'deploy'
        type: choice
        options:
          - deploy
          - build
          - skip-scrape

permissions:
  contents: write  # 允許 bot push archive 回 repo

jobs:
  report:
    runs-on: ubuntu-latest
    # 完整 pipeline：setup + Playwright chromium 安裝 + 3 主題 scrape + cosmate Graph API + analyze + ai_analyze + render + trending 萃取 + deploy + commit
    # 本機跑大約 15-20 min，GHA 加 Playwright 冷啟動約 25-30 min，預留 45 min margin
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build .env for Apify
        run: echo "APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}" > .env

      # Playwright 路徑（首選，repost/share 抓得到）
      # 若 GHA secret THREADS_COOKIES_JSON_BASE64 存在 → 還原 cookies + 裝 chromium；否則 weekly.sh fallback Apify
      - name: Restore Threads cookies (optional)
        id: restore_cookies
        env:
          THREADS_COOKIES_JSON_BASE64: ${{ secrets.THREADS_COOKIES_JSON_BASE64 }}
        run: |
          if [ -n "${THREADS_COOKIES_JSON_BASE64:-}" ]; then
            mkdir -p ~/.cosmate
            printf '%s' "$THREADS_COOKIES_JSON_BASE64" | base64 -d > ~/.cosmate/threads_cookies.json
            chmod 600 ~/.cosmate/threads_cookies.json
            echo "has_cookies=1" >> "$GITHUB_OUTPUT"
            echo "✅ Threads cookies 已還原 ($(wc -c < ~/.cosmate/threads_cookies.json) bytes)"
          else
            echo "has_cookies=0" >> "$GITHUB_OUTPUT"
            echo "ℹ️  無 THREADS_COOKIES_JSON_BASE64 secret，將 fallback Apify（FREE plan 無法抓 → 跳過 trending）"
          fi

      - name: Install Playwright + chromium
        if: steps.restore_cookies.outputs.has_cookies == '1'
        run: |
          pip install playwright certifi
          python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          THREADS_TOKEN_COSMATE: ${{ secrets.THREADS_TOKEN_COSMATE }}
          THREADS_USERID_COSMATE: ${{ secrets.THREADS_USERID_COSMATE }}
          THREADS_USERNAME_COSMATE: ${{ secrets.THREADS_USERNAME_COSMATE }}
          # Trending Signals 萃取（需 Claude + Notion）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          EXTRACT_TRENDING_SIGNALS: "1"
          # cookies 失效降級 Apify 時發 Telegram（scripts/notify_telegram.py）
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash scripts/weekly.sh ${{ github.event.inputs.mode || 'deploy' }}

      - name: Commit archive back to repo
        if: ${{ github.event.inputs.mode != 'build' && github.event.inputs.mode != 'skip-scrape' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/archive/ index.html || true
          git diff --cached --quiet || git commit -m "chore: weekly archive $(date +%Y-W%V)

          Co-Authored-By: GitHub Actions <noreply@github.com>"
          git push || echo "ℹ️  nothing to push (no changes)"

      - name: Deploy to Cloudflare Pages
        if: ${{ github.event.inputs.mode != 'build' && github.event.inputs.mode != 'skip-scrape' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=threads-analytics-report --commit-dirty=true

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_number }}
          path: |
            index.html
            data/per_topic/
          retention-days: 30
