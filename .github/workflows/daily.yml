name: Threads 每日熱榜

on:
  # schedule:
  #   # 每天 01:30 UTC = 09:30 GMT+8（需要時取消這兩行的註解）
  #   - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '執行模式'
        required: false
        default: 'deploy'
        type: choice
        options:
          - deploy
          - no-ai

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -q apify-client requests python-dateutil pytz

      - name: Build .env for Apify
        run: echo "APIFY_TOKEN=${{ secrets.APIFY_TOKEN }}" > .env

      - name: Run daily pipeline
        run: bash scripts/daily.sh ${{ github.event.inputs.mode || 'deploy' }}

      - name: Commit daily report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily/index.html data/daily/ || true
          git diff --cached --quiet || git commit -m "chore: daily report $(date +%Y-%m-%d)

          Co-Authored-By: GitHub Actions <noreply@github.com>"
          git push || echo "ℹ️  nothing to push (no changes)"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=threads-analytics-report --commit-dirty=true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_number }}
          path: daily/index.html
          retention-days: 14
