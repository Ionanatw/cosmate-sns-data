 0.0, "dt": "2026-04-05T11:23:51+08:00", "hour": 11, "weekday": "Sunday", "source": "anime_2026-04-20_042228.json"}, {"author": "lunacatweiyu", "url": "https://www.threads.net/@lunacatweiyu/post/DWvHS0noDSM", "text": "驅魔少年、戀上換裝娃娃、最遊記、鬼滅、忍者亂太郎、排球少年的作者也是女性喔！\n就是因為日本社會對女性漫畫家畫少年漫畫有著嚴重的偏見和歧視，如果一開始知道是女性漫畫家就不看作品，好像還會寄恐嚇信或威脅出版社，所以出道時就會取比較中性的名字，而且在成名前通常不會公開性別\n\n明明只要作品好看就夠了吧？是男是女很重要嗎？", "likes": 3377, "comments": 31, "reposts": 0, "shares": 0, "total_engagement": 3408, "primary_type": "E", "types": ["E"], "comment_rate": 0.92, "share_rate": 0.0, "dt": "2026-04-05T12:13:24+08:00", "hour": 12, "weekday": "Sunday", "source": "anime_2026-04-20_042228.json"}, {"author": "mr.marker.art", "url": "https://www.threads.net/@mr.marker.art/post/DW1i8elE4dF", "text": "我覺得這系列應該要很多人知道，所以分享一下\n\n台灣最近有六家動畫工作室共同製作名為《奇談島航》的選集系列，每一集都是獨立故事，同時運用不同的媒介與技法講述各種不同類型的故事。\n我很期待的是大貓工作室製作的單元三分之二，當然其他的作品也是非常讓人期待的，只希望各位可以多多注意不然看到作品在海外平台迴響但台灣沒人討論就覺得很可惜😭😭😭💔💔💔❤️❤️❤️❤️❤️❤️", "likes": 3280, "comments": 40, "reposts": 0, "shares": 0, "total_engagement": 3320, "primary_type": "E", "types": ["E"], "comment_rate": 1.22, "share_rate": 0.0, "dt": "2026-04-08T00:10:28+08:00", "hour": 0, "weekday": "Wednesday", "source": "anime_2026-04-20_042228.json"}, {"author": "miy_art_501", "url": "https://www.threads.net/@miy_art_501/post/DW8WgMvlKIT", "text": "創作者都會面對的問題。\n\n\"很喜歡老師的作品，但是老師你太政治了，對老師太失望了，我要退訂、取消追蹤。\"\n\n你知道 <魔法帽的工作室> 的 白濱鷗 老師嗎?\n漫畫很好看，創作技術一流，動畫更是超棒的，\n喜不喜歡?\n\n你要不要去老師的 X 看一下，看她最近都轉發甚麼文?她支持甚麼?\n\n不要雙標，不要用你的觀點牽制創作者發言的自由，\n政治100%充滿了你我四周的一切，從來沒有脫鉤過，\n你可以繼續過你的粉紅色人生，以為世界是遶著你在轉，\n做你的美夢，等火燒到你的衣服。\n\n我只是很早就知道現在所擁有的，都是前輩努力爭取而來，\n我做的努力是不讓敵人毀滅這一切。\n\n諫山創、尾田榮一郎 他們都沒有說，但是作品裡可以看的出來想表達的東西。", "likes": 2427, "comments": 47, "reposts": 0, "shares": 0, "total_engagement": 2474, "primary_type": "E", "types": ["E"], "comment_rate": 1.94, "share_rate": 0.0, "dt": "2026-04-10T15:36:26+08:00", "hour": 15, "weekday": "Friday", "source": "anime_2026-04-20_042228.json"}, {"author": "massu._.boo_", "url": "https://www.threads.net/@massu._.boo , "shares": 2, "total_engagement": 45, "primary_type": "E", "types": ["E"], "comment_rate": 5.0, "share_rate": 4.44, "dt": "2026-03-31T20:36:03+08:00", "hour": 20, "weekday": "Tuesday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW8hpoXEiVW", "text": "明天有快兩百位朋友要去高雄場，還有誰也打算去呢？來徵友吧～", "likes": 37, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 37, "primary_type": "E", "types": ["E"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-04-10T17:13:50+08:00", "hour": 17, "weekday": "Friday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWn4d1aCMNs", "text": "可以跟喜歡的cos作品互動了RRRRR\n很多用戶跟我們說，本來在CosMate逛的作品集，看到有趣分享照或心動的 Cos，卻只能隔著螢幕默默點讚，總覺得少了點什麼\n\n所以我們把死路打通了\n作品集改名叫「收藏」，去限時探索逛逛，感覺就像走進線上同人場，看到喜歡的可直接大聲誇誇，興趣對了直接聊開", "likes": 20, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 20, "primary_type": "E", "types": ["E"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-04-02T16:49:09+08:00", "hour": 16, "weekday": "Thursday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW3bZofkjyR", "text": "各位！！連載真的要再開了！！！！\n謝謝老婆好甜☺️", "likes": 14, "comments": 0, "reposts": 1, "shares": 2, "total_engagement": 17, "primary_type": "E", "types": ["E"], "comment_rate": 0.0, "share_rate": 11.76, "dt": "2026-04-08T17:43:01+08:00", "hour": 17, "weekday": "Wednesday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW03vWHkgV8", "text": "根據非正式統計動漫同好聊天翻車的前三原因：\n1. 不小心說了對方的雷角色\n2. 聊到爛尾劇情各有立場\n3. CP 不合直接吵起來\n所以 CosMate app 有雷點自由設定的功能 開聊前先知道彼此雷什麼 翻車率直接 -80%（數據純屬估算）\n\n填填看，直接速做張你的雷點單：", "likes": 15, "comments": 1, "reposts": 0, "shares": 0, "total_engagement": 16, "primary_type": "E", "types": ["E"], "comment_rate": 6.67, "share_rate": 0.0, "dt": "2026-04-07T17:52:56+08:00", "hour": 17, "weekday": "Tuesday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW83RELkuRF", "text": "每次參加場次這麼大、人這麼多，剛入圈可能要靠緣分才能被看到\n我們想讓這件事變得容易一點點\n所以開發了這個給C圈和宅圈同好使用的app\n\n在首頁發一篇限時探索\n說不定會馬上和新同好展開新的緣分\n「我在現場，求破圈...」\n「一個人來的，有沒有人要一起晃晃👀」\n「攝影師到場，我要去找Coser了！！！」", "likes": 15, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 15, "primary_type": "X", "types": ["X"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-04-10T20:22:43+08:00", "hour": 20, "weekday": "Friday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DXHCZRREh2e", "text": "「樹洞」指的是一個可以安全傾訴秘密、抒發情感，沒有壓力去分享的地方\n這幾年跟同坑親友聊，一直覺得好需要「動漫界的樹洞」\n在別的社群上發文，多少要顧慮現實朋友的眼光\n有時怕打擾到別人，就變得很難破圈交新朋友\n\n所以才誕生出一個”動漫界的專屬樹洞”\n先匿名從新的共同話題開始聊，再決定要不要成為好友\n希望動漫同好們能有個隨時傾訴的秘密基地！！", "likes": 13, "comments": 0, "reposts": 0, "shares": 1, "total_engagement": 14, "primary_type": "B", "types": ["B", "D"], "comment_rate": 0.0, "share_rate": 7.14, "dt": "2026-04-14T19:12:22+08:00", "hour": 19, "weekday": "Tuesday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWV-dlnkugQ", "text": "春天要來了 精選了15部春季強新番（放在留言\n你們有最期待哪部嗎？\n（我好想邊看邊聊雞鬥士", "likes": 9, "comments": 3, "reposts": 0, "shares": 0, "total_engagement": 12, "primary_type": "X", "types": ["X"], "comment_rate": 33.33, "share_rate": 0.0, "dt": "2026-03-26T17:55:13+08:00", "hour": 17, "weekday": "Thursday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWldxvGklRq", "text": "在宅宅世界裡，最適合形容你自己身份是......(可複選）\n🧝‍♀️ Coser\n🔰 新手\n💄 妝娘\n🧑‍🎤 毛娘\n📸 攝影\n✨ 動漫迷\n🎮 遊戲宅\n🎧 V推\n🚶 路人", "likes": 8, "comments": 2, "reposts": 0, "shares": 0, "total_engagement": 10, "primary_type": "X", "types": ["X"], "comment_rate": 25.0, "share_rate": 0.0, "dt": "2026-04-01T18:17:28+08:00", "hour": 18, "weekday": "Wednesday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWjEaTMEtnQ", "text": "這可能是第一個定義你身份的社交平台，這一個月來我們埋頭趕工，你們要的我們真的做出來了！\n👉「限時探索」正式開放囉\n\n我們在首頁開發了新功能，不管是日常碎碎念、選擇題，或是分享自己的愛好、收藏的作品，都能隨手紀錄，也特別加入了匿名回覆機制，雙方成為好友才會看到彼此資料，就是想把交流的門檻降到最低，互動不再隔著層紗。\n\n我們真心想守護大家喜歡宅文化的這份熱情，想讓 CosMate app成為一個好玩的空間。\n謝謝你們的建議與等待", "likes": 6, "comments": 3, "reposts": 0, "shares": 1, "total_engagement": 10, "primary_type": "X", "types": ["X"], "comment_rate": 50.0, "share_rate": 10.0, "dt": "2026-03-31T19:57:20+08:00", "hour": 19, "weekday": "Tuesday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DXOfBDOkoqu", "text": "找新朋友已經很難，連用哪個APP都選擇困難？\n我們參考了近百篇文章 集結各方近一年的親身(血淚)經驗\n把在台灣受歡迎的交友、找同好APP融入到這個心理測驗\n10題測完 就知道你最適合哪 2 個交友軟體", "likes": 6, "comments": 2, "reposts": 0, "shares": 0, "total_engagement": 8, "primary_type": "C", "types": ["C"], "comment_rate": 33.33, "share_rate": 0.0, "dt": "2026-04-17T16:37:09+08:00", "hour": 16, "weekday": "Friday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW547lfkl4C", "text": "抱歉讓大家久等了💦\nCosMate的破冰話題今天正式修好了\n\n前幾天也新推出「限時探索」功能 比原版更容易即時找同好~\n之前卡關的朋友們可以去試試看\n一句破冰一句話，跟同好開啟對話真的不難", "likes": 7, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 7, "primary_type": "X", "types": ["X"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-04-09T16:39:33+08:00", "hour": 16, "weekday": "Thursday", "source": "cosmate_2026-04-20_122826.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DXOgfF8Etqd", "text": "我們做了一個交友心理測驗！！\n10題可以測你是哪種交友人格\n還會告訴你適合用什麼交友app👀", "likes": 4, "comments": 2, "reposts": 0, "shares": 0, "total_engagement": 6, "primary_type": "C", "types": ["C"], "comment_rate": 50.0, "share_rate": 0.0, "dt": "2026-04-17T16:50:00+08:00", "hour": 16, "weekday": "Friday", "source": "cosmate_202 function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmt(n) { return n.toLocaleString(); }

function fmtDate(iso) { return iso ? iso.slice(0,10) : '—'; }

function renderPanel(topic, accent) {
  const d = DATA[topic];
  if (!d) return '<p style="color:#a0a0a0;text-align:center;padding:40px;">No data</p>';

  // Hero metrics
  const top1 = d.top_posts[0];
  const daysWindow = d.days_window || 30;

  let html = `
    <div class="metrics-grid">
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${d.total_posts}</span>
        <span class="metric-label">近 ${daysWindow} 天貼文</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${d.total_posts_7d}</span>
        <span class="metric-label">近 7 天貼文</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${fmt(top1.likes)}</span>
        <span class="metric-label">最高單篇按讚</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${fmt(d.thresholds.likes_p90)}</span>
        <span class="metric-label">爆款門檻 (P90)</span>
      </div>
    </div>
  `;

  // Helper to render a post table
  function renderPostTable(posts) {
    let h = `<div class="card"><table>
      <thead><tr>
        <th>排名</th><th>用戶</th><th>內容</th>
        <th class="num">❤️</th><th class="num">💬</th><th class="num">🔁</th><th class="num">✈️</th>
        <th class="num">類型</th>
      </tr></thead><tbody>`;
    posts.forEach((p, i) => {
      const text = p.text.replace(/\n/g, ' ').slice(0, 70);
      const linkOpen = p.url ? `<a href="${escapeHtml(p.url)}" target="_blank" rel="noopener">` : '';
      const linkClose = p.url ? '</a>' : '';
      h += `<tr>
        <td style="color:${accent};font-weight:700">#${i+1}</td>
        <td>${linkOpen}@${escapeHtml(p.author)}${linkClose}</td>
        <td class="text-cell">${escapeHtml(text)}</td>
        <td class="num">${fmt(p.likes)}</td>
        <td class="num">${fmt(p.comments)}</td>
        <td class="num">${fmt(p.reposts)}</td>
        <td class="num">${fmt(p.shares)}</td>
        <td class="num"><span style="background:${d.type_info[p.primary_type].color};color:#000;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600">${p.primary_type}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
    return h;
  }

  // 標準：只取非 Type X（A/B/C/D/E）
  const qualified30d = d.top_posts.filter(p => p.primary_type !== 'X');
  const qualified7d = (d.top_posts_7d || []).filter(p => p.primary_type !== 'X');

  // Top 10 posts — 近 N 天
  html += `<h2 class="section-title">🔥 Top 10 熱門貼文 <small>近 ${daysWindow} 天 · 排除 Type X 長尾</small></h2>`;
  if (qualified30d.length > 0) {
    html += renderPostTable(qualified30d.slice(0, 10));
  } else {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary);padding:32px">近 ${daysWindow} 天無符合標準貼文</div>`;
  }

  // Top 10 posts — 近 7 天（進階區塊）
  html += `<h2 class="section-title">⚡ 近 7 天最熱 <small>${d.total_posts_7d} 篇 · 僅列符合標準（A-E）</small></h2>`;
  if (qualified7d.length > 0) {
    html += renderPostTable(qualified7d.slice(0, 10));
  } else {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary);padding:32px">本週無符合標準貼文</div>`;
  }

  // Type distribution
  html += `<h2 class="section-title">📊 互動類型分布 <small>單篇可同時符合多型</small></h2><div class="card">`;
  const maxCount = Math.max(...Object.values(d.type_counts));
  ['A','B','C','D','E','X'].forEach(t => {
    const info = d.type_info[t];
    const cnt = d.type_counts[t];
    const pct = Math.round(cnt / d.total_posts * 100);
    const barW = maxCount ? Math.round(cnt / maxCount * 100) : 0;
    html += `<div class="type-row">
      <div class="type-badge" style="background:${info.color}">${info.emoji}</div>
      <div class="type-info">
        <div class="type-name">Type ${t}：${info.name} <span style="color:${accent}">${cnt}篇 (${pct}%)</span></div>
        <div class="type-desc">${info.desc}</div>
      </div>
      <div class="type-bar-wrap"><div class="type-bar" style="background:${info.color};width:${barW}%"></div></div>
    </div>`;
  });
  html += `</div>`;

  // Hourly distribution
  html += `<h2 class="section-title">⏰ 24 小時發文分布 <small>台北時間 GMT+8</small></h2><div class="card">`;
  const hourlyArr = Array.from({length:24}, (_,h) => d.hourly[h] || {count:0,avg_engagement:0});
  const maxH = Math.max(...hourlyArr.map(x => x.count)) || 1;
  html += `<div class="hourly">`;
  hourlyArr.forEach((h, i) => {
    const ht = Math.round(h.count / maxH * 100);
    html += `<div class="hour-bar" style="height:${ht}%;background:${accent}" data-tooltip="${i}:00 · ${h.count}篇 · 平均${Math.round(h.avg_engagement).toLocaleString()}互動"></div>`;
  });
  html += `</div><div class="hour-labels">`;
  for (let h = 0; h < 24; h++) html += `<div>${h % 3 === 0 ? h : ''}</div>`;
  html += `</div></div>`;

  // Daily distribution
  html += `<h2 class="section-title">📅 週間分布</h2><div class="card"><div class="daily">`;
  ['週一','週二','週三','週四','週五','週六','週日'].forEach(day => {
    const dd = d.daily[day] || {count:0,avg_engagement:0};
    html += `<div class="day-cell">
      <div class="label">${day}</div>
      <div class="count">${dd.count}</div>
      <div class="eng">${Math.round(dd.avg_engagement).toLocaleString()}</div>
    </div>`;
  });
  html += `</div></div>`;

  // AI 洞察分析（若有）
  const insight = d.ai_insight;
  if (insight) {
    html += `<h2 class="section-title" style="margin-top:48px">🧠 AI 洞察分析</h2>`;
    html += `<div class="card" style="border-left:4px solid ${accent};padding:28px;">`;
    html += `<div style="font-size:1.2rem;font-weight:800;margin-bottom:20px;line-height:1.4;">${escapeHtml(insight.headline)}</div>`;

    (insight.patterns || []).forEach((pat, i) => {
      html += `<div style="margin-bottom:24px${i > 0 ? ';border-top:1px solid var(--glass-border);padding-top:20px' : ''}">`;
      html += `<div style="font-weight:700;font-size:1rem;margin-bottom:6px;">${['🔥','✈️','💬','❤️'][i] || '📊'} ${escapeHtml(pat.name)} <span style="color:${accent};font-size:0.85rem;font-weight:600;">${escapeHtml(pat.trigger_type)}</span></div>`;
      html += `<div style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:12px;">${escapeHtml(pat.desc)}</div>`;

      // 代表案例
      (pat.examples || []).forEach(ex => {
        html += `<div style="background:var(--bg);border-radius:10px;padding:12px 16px;margin-bottom:8px;">`;
        html += `<span style="font-weight:600;color:${accent}">${escapeHtml(ex.author)}</span>`;
        html += ` <span style="font-size:0.8rem;color:var(--text-secondary)">${escapeHtml(ex.metric)}</span><br>`;
        html += `<span style="font-size:0.88rem">「${escapeHtml(ex.text)}」</span>`;
        html += `</div>`;
      });

      // 操作要點
      html += `<div style="margin-top:10px;padding:10px 14px;background:#f8f5ee;border-radius:8px;font-size:0.85rem;">`;
      html += `<strong>操作要點：</strong>${escapeHtml(pat.actionable)}`;
      html += `</div></div>`;
    });

    // 隱藏發現
    if (insight.hidden_finding) {
      html += `<div style="margin-top:20px;padding:16px 20px;background:linear-gradient(135deg,#141413,#2a2924);color:#fff;border-radius:12px;">`;
      html += `<div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:${accent};margin-bottom:8px;">Hidden Finding</div>`;
      html += `<div style="font-size:0.95rem;line-height:1.6;">${escapeHtml(insight.hidden_finding)}</div>`;
      html += `</div>`;
    }

    html += `</div>`;
  }

  return html;
}

// Init
document.querySelectorAll('.panel').forEach(panel => {
  const topic = panel.dataset.topic;
  const accent = getComputedStyle(document.querySelector(`.tab-btn[data-topic="${topic}"]`)).getPropertyValue('--accent').trim();
  panel.innerHTML = renderPanel(topic, accent);
});

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const topic = btn.dataset.topic;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + topic).classList.add('active');
  });
});
</script>
</body>
</html>
