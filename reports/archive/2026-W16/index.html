 4.52, "share_rate": 0.0, "dt": "2026-04-05T14:58:00+08:00", "hour": 14, "weekday": "Sunday", "source": "anime_2026-04-09_145319.json"}, {"author": "lylamareep", "url": "https://www.threads.net/@lylamareep/post/DW3cDGbEWzH", "text": "這季新番實在太富足⋯先看了幾部最期待的\n\n身世最悲慘：《黃昏使者》\n（牛媽作品，沒看過原作感覺是王道？）\n\n最青春療癒：《冰之城牆》\n（女主角幻視黑沼爽子，悲慘社畜每季都需要一個高中生故事來寄託心靈）\n\n最熱血最佳動畫化：《朱音落語》\n（原作雖然熱血但落語靜態跟動態的表現體感實在差太多了，動畫超讚額額額，而且OP超像戰鬥番的）\n\n最硬核：《日本三國》\n（資訊量過大，敘事和表現形式不像連載很有電影感）\n\n個人霸權預定：《魔法帽的工作室》\n（原作的畫風跟故事都ㄅ級分，動起來後有幾幕連畫風都非常還原實在太感激⋯⋯奇夫利老師是2026最帥男角⋯⋯）", "likes": 555, "comments": 16, "reposts": 0, "shares": 0, "total_engagement": 571, "primary_type": "X", "types": ["X"], "comment_rate": 2.88, "share_rate": 0.0, "dt": "2026-04-08T17:48:41+08:00", "hour": 17, "weekday": "Wednesday", "source": "anime_2026-04-09_145319.json"}, {"author": "semiaaalll", "url": "https://www.threads.net/@semiaaalll/post/DXCVmA4mYyC", "text": "😍🔥目前4月新番那些捨不得跳過的OP/ED", "likes": 519, "comments": 8, "reposts": 0, "shares": 0, "total_engagement": 527, "primary_type": "X", "types": ["X"], "comment_rate": 1.54, "share_rate": 0.0, "dt": "2026-04-12T23:23:56+08:00", "hour": 23, "weekday": "Sunday", "source": "anime_2026-04-14_025426.json"}, {"author": "white.81.81", "url": "https://www.threads.net/@white.81.81/post/DWvCxXimDtd", "text": "而且聽說牛媽是鄉下農家人，所以很常看到肌肉男，也喜歡肌肉男所以會在漫畫裡塞私貨", "likes": 469, "comments": 11, "reposts": 0, "shares": 0, "total_engagement": 480, "primary_type": "X", "types": ["X"], "comment_rate": 2.35, "share_rate": 0.0, "dt": "2026-04-05T11:33:53+08:00", "hour": 11, "weekday": "Sunday", "source": "anime_2026-04-09_145319.json"}, {"author": "liojohnny_0904", "url": "https://www.threads.net/@liojohnny_0904/post/DW0OCWZk_8j", "text": "許願巴哈可以上啊 不然我要去哪裡看啊\n早上翻了一下新番才發現巴哈沒有\n曼迪有接應該有機會吧⋯？", "likes": 373, "comments": 16, "reposts": 0, "shares": 0, "total_engagement": 389, "primary_type": "X", "types": ["X"], "comment_rate": 4.29, "share_rate": 0.0, "dt": "2026-04-07T11:48:32+08:00", "hour": 11, "weekday": "Tuesday", "source": "a 6, "primary_type": "E", "types": ["E"], "comment_rate": 2.14, "share_rate": 0.0, "dt": "2026-04-01T22:51:35+08:00", "hour": 22, "weekday": "Wednesday", "source": "love_2026-04-14_010344.json"}, {"author": "sna.kzn", "url": "https://www.threads.net/@sna.kzn/post/DWbYp4FkjK6", "text": "最近在交友軟體上認識了一個很好聊三觀很正的男生\n前幾天有見過面，那天也蠻開心的，聊到捷運末班車才回去\n感覺他是一個可以 deep talk 的人，好久沒遇到這種人了\n\n不過見面回來之後，他回訊息的速度好像變慢了\n雖然也可能是我想太多，大概知道是自己高敏感的性格又在作祟\n但還是忍不住想，是不是自己跟照片差太大、不夠好看，他當時只是禮貌上沒說而已\n\n會想問為什麼不像前幾天一樣熱絡了？為什麼不回我訊息？是不是遇到其他更好聊更漂亮的女生了？\n當然我沒有問啦，我知道這樣很沒禮貌也很不尊重\n\n況且我們現在連朋友都算不上，對一個陌生人有佔有慾是一件很可笑的事\n人家有自己的生活想回就回，我有什麼資格叫人家回我訊息啊\n\n這些道理我都知道，但還是會忍不住去想\n我也知道會胡思亂想多半是太閒了，讓自己忙起來就好\n但畢竟人不可能忙 24 小時，在靜下來的時候這種念頭就會咻咻咻地冒出來\n\n之前也有類似的經歷，就算是對認識很久很好的朋友也一樣\n明明知道對方沒有討厭自己，但還是會去想自己到底哪裡做錯了\n重點是我明明也常常塑膠別人笑死\n\n隨便我也不知道，我就是個很難搞的人\n好討厭這樣的自己，愛自己這件事我永遠做不到", "likes": 2226, "comments": 150, "reposts": 0, "shares": 0, "total_engagement": 2376, "primary_type": "E", "types": ["E"], "comment_rate": 6.74, "share_rate": 0.0, "dt": "2026-03-28T20:20:18+08:00", "hour": 20, "weekday": "Saturday", "source": "love_2026-04-14_010344.json"}, {"author": "crazychelsy", "url": "https://www.threads.net/@crazychelsy/post/DXDeHoEiVP0", "text": "昨天回家路上突然想到\n為什麼交友軟體滑那麼久\n都沒有覺得好看的工程師🫠\n更哀傷的是\n敝人自己就在科技業\n公司裡覺得「唉唷，不錯喔」的\n經旁敲側擊\n都名花有主\n簡直生無可戀😭\n我覺得我對單身好看工程師\n應該不要再有期待😂\n就算是新竹這種地方\n484～～～～～", "likes": 1864, "comments": 381, "reposts": 0, "shares": 0, "total_engagement": 2245, "primary_type": "C", "types": ["C"], "comment_rate": 20.44, "share_rate": 0.0, "dt": "2026-04-13T09:57:40+08:00", "hour": 9, "weekday": "Monday", "source": "love_2026-04-14_010344.json"}, {"author": "kakuka1010", "url": "https://www.threads.net/@kakuka1010/post/DW04sCFE7_k", "text": "本人女，想說交友軟體上的女生有這麼難聊嗎？扮成男生上去聊一次，還真的都住南寮漁港", "likes": 2004, "comments": 25, "reposts": 0, "shares": 0, "total_engagement": 2029, "primary_type": "E", "types": ["E"], "comment_rate": 1.25, "share_rate": 0.0, "dt": "2026-04-07T18:01:13+08:00", "hour": 18, "weekday": "Tuesday", "source": "love_2026-04-14_010 WAN #MegaHouse #柴語錄\n#小澤亜李 #聲優見面會 #CWT", "likes": 590, "comments": 16, "reposts": 0, "shares": 0, "total_engagement": 606, "primary_type": "E", "types": ["E"], "comment_rate": 2.71, "share_rate": 0.0, "dt": "2026-04-08T19:47:56+08:00", "hour": 19, "weekday": "Wednesday", "source": "cosplay_2026-04-14_015429.json"}], "X": [{"author": "cos_cleaner", "url": "https://www.threads.net/@cos_cleaner/post/DW_0I4HGNFL", "text": "是我去高雄Acosta出的不夠好看嗎？沒什麼人找我拍", "likes": 637, "comments": 32, "reposts": 0, "shares": 0, "total_engagement": 669, "primary_type": "X", "types": ["X"], "comment_rate": 5.02, "share_rate": 0.0, "dt": "2026-04-11T23:53:07+08:00", "hour": 23, "weekday": "Saturday", "source": "cosplay_2026-04-14_025607.json"}, {"author": "masako.cos_", "url": "https://www.threads.net/@masako.cos_/post/DV-RvzPkqR4", "text": "一直都有留意vtuber 米亞\n雖然冇乜點睇佢直播\n但自從佢開始出片 就開始keep住睇\n啲片剪得好好睇 莫名嘅療癒感😭\n有啲想cos 米亞🥹 雖然好似市面上好似未有cos服買到住🥲", "likes": 375, "comments": 37, "reposts": 0, "shares": 0, "total_engagement": 412, "primary_type": "X", "types": ["X"], "comment_rate": 9.87, "share_rate": 0.0, "dt": "2026-03-17T13:01:58+08:00", "hour": 13, "weekday": "Tuesday", "source": "cosplay_2026-04-14_015429.json"}, {"author": "chipmunk.4220301", "url": "https://www.threads.net/@chipmunk.4220301/post/DWzpA3wE-km", "text": "今天去台中動漫展超級失望\n10攤有8攤都是盲盒和一番賞\n我都不知道是賭博展還是動漫展了", "likes": 290, "comments": 62, "reposts": 0, "shares": 0, "total_engagement": 352, "primary_type": "X", "types": ["X"], "comment_rate": 21.38, "share_rate": 0.0, "dt": "2026-04-07T06:25:01+08:00", "hour": 6, "weekday": "Tuesday", "source": "cosplay_2026-04-14_025607.json"}, {"author": "love961003", "url": "https://www.threads.net/@love961003/post/DWrSd6vj2fz", "text": "請廣大的脆友幫我找找台中漫展這位雷姆coser的ig", "likes": 298, "comments": 11, "reposts": 0, "shares": 0, "total_engagement": 309, "primary_type": "X", "types": ["X"], "comment_rate": 3.69, "share_rate": 0.0, "dt": "2026-04-04T00:34:05+08:00", "hour": 0, "weekday": "Saturday", "source": "cospl t_rate": 43.75, "share_rate": 30.77, "dt": "2026-03-24T17:55:22+08:00", "hour": 17, "weekday": "Tuesday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWD5K2JEokC", "text": "「在別的交友軟體po了cos照卻被對方已讀😌」\n「明明到交友軟體認真寫了自己屬性 聊一聊卻被句點🥲」\n\n所以我們開發CosMate這個二次元交友app的初衷，其實很簡單：\n讓「喜歡動漫」這個興趣成為被看見的起點。\n不是每個交友軟體的人都懂你的梗，但在CosMate根本不需要解釋~\n在這裡，聊動漫是共通語言、Cosplay 是日常，是更容易被理解的地方。\n你遇見的人說不定也正在找一個特別的你", "likes": 56, "comments": 8, "reposts": 3, "shares": 2, "total_engagement": 69, "primary_type": "B", "types": ["B"], "comment_rate": 14.29, "share_rate": 2.9, "dt": "2026-03-19T17:22:38+08:00", "hour": 17, "weekday": "Thursday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DXB0w6dkibt", "text": "Acosta 第二天大遊行～", "likes": 58, "comments": 0, "reposts": 1, "shares": 4, "total_engagement": 63, "primary_type": "B", "types": ["B", "D"], "comment_rate": 0.0, "share_rate": 6.35, "dt": "2026-04-12T18:37:29+08:00", "hour": 18, "weekday": "Sunday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWjI15nEi15", "text": "開發CosMate app 的初衷是想讓同好們的宅屬性成為彼此相認的默契，破圈認識新朋友。\n我們懂那種「想搭訕又怕尷尬」的猶豫，所以推出了全新的「限時探索」功能！\n\n在首頁可以無上限隨手發布心情、日常照或互動選擇題，特別強化了一對一匿名回覆機制，就是想讓大家能從興趣出發、自然地開口聊天，不再只能默默潛水。\n\n一起打造友善又好玩的二次元交友空間，有空可以來玩玩看👾", "likes": 39, "comments": 2, "reposts": 1, "shares": 2, "total_engagement": 44, "primary_type": "E", "types": ["E"], "comment_rate": 5.13, "share_rate": 4.55, "dt": "2026-03-31T20:36:03+08:00", "hour": 20, "weekday": "Tuesday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW8hpoXEiVW", "text": "明天有快兩百位朋友要去高雄場，還有誰也打算去呢？來徵友吧～", "likes": 36, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 36, "primary_type": "E", "types": ["E"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-04-10T17:13:  "url": "https://www.threads.com/@cosmatedaily/post/DW83RELkuRF", "text": "每次參加場次這麼大、人這麼多，剛入圈可能要靠緣分才能被看到\n我們想讓這件事變得容易一點點\n所以開發了這個給C圈和宅圈同好使用的app\n\n在首頁發一篇限時探索\n說不定會馬上和新同好展開新的緣分\n「我在現場，求破圈...」\n「一個人來的，有沒有人要一起晃晃👀」\n「攝影師到場，我要去找Coser了！！！」", "likes": 14, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 14, "primary_type": "X", "types": ["X"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-04-10T20:22:43+08:00", "hour": 20, "weekday": "Friday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DV-vT2jkkYt", "text": "想衝崩鐵三週年路跑還沒揪到人😭\n怕一人參加太孤單，又真的超想要那個團報禮跟完賽獎牌，好想衝一波\n\n使用 CosMate app 寫下活動破冰話題，或許會立刻揪到意想不到的新同好👀", "likes": 8, "comments": 2, "reposts": 1, "shares": 2, "total_engagement": 13, "primary_type": "X", "types": ["X"], "comment_rate": 25.0, "share_rate": 15.38, "dt": "2026-03-17T17:20:17+08:00", "hour": 17, "weekday": "Tuesday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWV-dlnkugQ", "text": "春天要來了 精選了15部春季強新番（放在留言\n你們有最期待哪部嗎？\n（我好想邊看邊聊雞鬥士", "likes": 9, "comments": 3, "reposts": 0, "shares": 0, "total_engagement": 12, "primary_type": "X", "types": ["X"], "comment_rate": 33.33, "share_rate": 0.0, "dt": "2026-03-26T17:55:13+08:00", "hour": 17, "weekday": "Thursday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWldxvGklRq", "text": "在宅宅世界裡，最適合形容你自己身份是......(可複選）\n🧝‍♀️ Coser\n🔰 新手\n💄 妝娘\n🧑‍🎤 毛娘\n📸 攝影\n✨ 動漫迷\n🎮 遊戲宅\n🎧 V推\n🚶 路人", "likes": 7, "comments": 2, "reposts": 0, "shares": 0, "total_engagement": 9, "primary_type": "X", "types": ["X"], "comment_rate": 28.57, "share_rate": 0.0, "dt": "2026-04-01T18:17:28+08:00", "hour": 18, "weekday": "Wednesday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWjEaTMEtnQ", "text": "這可能是第一個定義你身份的社交平台，這一個月來我們埋頭趕工，你們要的我們真的做出來了！\n👉「限時探索」正式開放囉\n\n我們在首頁開發了新功能，不管是日常碎碎念、選擇題，或是分享自己的愛好、收藏的作品，都能隨手紀錄，也特別加入了匿名回覆機制，雙方成為好友才會看到彼此資料，就是想把交流的門檻降到最低，互動不再隔著層紗。\n\n我們真心想守護大家喜歡宅文化的這份熱情，想讓 CosMate app成為一個好玩的空間。\n謝謝你們的建議與等待", "likes": 5, "comments": 3, "reposts": 0, "shares": 1, "total_engagement": 9, "primary_type": "X", "types": ["X"], "comment_rate": 60.0, "share_rate": 11.11, "dt": "2026-03-31T19:57:20+08:00", "hour": 19, "weekday": "Tuesday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWGlfkzknvx", "text": "為了拯救我們這些 I 人，CosMate app即將推出全新的 「限時探索」 功能！\n我們延伸很多朋友喜歡的破冰話題：\n🎮 結合文字 + 投票 + 圖片破冰，讓所有的分享都變成破冰開聊的話題\n不用再硬擠什麼「安安你好」這種尷尬開場白了，\n直接丟一張當季梗圖或是開個「這部誰才是真婆」的投票，讓圖片和話題幫開路，互動起來超自然\n⏳ 限時分享，聊天更有節奏感\n不用擔心沒話題要乾聊，透過限時的互動機制，\n讓大家在最熱血的時刻相遇，不知不覺就聊進心坎裡~\n\n大家還有什麼「如果有了這個功能，我一定會下載」的想法嗎？\n如果很多人喜歡的，我們會努力放進去!", "likes": 7, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 7, "primary_type": "X", "types": ["X"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-03-20T18:28:26+08:00", "hour": 18, "weekday": "Friday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW547lfkl4C", "text": "抱歉讓大家久等了💦\nCosMate的破冰話題今天正式修好了\n\n前幾天也新推出「限時探索」功能 比原版更容易即時找同好~\n之前卡關的朋友們可以去試試看\n一句破冰一句話，跟同好開啟對話真的不難", "likes": 6, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 6, "primary_type": "X", "types": ["X"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-04-09T16:39:33+08:00", "hour": 16, "weekday": "Thursday", "source": "cosmate_2026-04-14_024837.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWYi7UQkjXx", "text": "週五了準備下班下課！找不到一起討論聊春番的朋友...?\n我們開發了CosMate app ，匿名的聊天方式，給大家放鬆說出自己想法的空間，可先從同坑開聊，聊的來就交朋友，聊不來也沒關係。\n和新朋友聊聊新番心得、你的推角或入圈心路歷程，週末的宅宅也不孤單😌", "likes": 5, "comments": 0, "reposts": 1, "shares": 0, "total_engagement": 6, "primary_type": "X", "types": ["X"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-03-27T17:52:20+ function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmt(n) { return n.toLocaleString(); }

function fmtDate(iso) { return iso ? iso.slice(0,10) : '—'; }

function renderPanel(topic, accent) {
  const d = DATA[topic];
  if (!d) return '<p style="color:#a0a0a0;text-align:center;padding:40px;">No data</p>';

  // Hero metrics
  const top1 = d.top_posts[0];
  const daysWindow = d.days_window || 30;

  let html = `
    <div class="metrics-grid">
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${d.total_posts}</span>
        <span class="metric-label">近 ${daysWindow} 天貼文</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${d.total_posts_7d}</span>
        <span class="metric-label">近 7 天貼文</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${fmt(top1.likes)}</span>
        <span class="metric-label">最高單篇按讚</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${fmt(d.thresholds.likes_p90)}</span>
        <span class="metric-label">爆款門檻 (P90)</span>
      </div>
    </div>
  `;

  // Helper to render a post table
  function renderPostTable(posts) {
    let h = `<div class="card"><table>
      <thead><tr>
        <th>排名</th><th>用戶</th><th>內容</th>
        <th class="num">❤️</th><th class="num">💬</th><th class="num">🔁</th><th class="num">✈️</th>
        <th class="num">類型</th>
      </tr></thead><tbody>`;
    posts.forEach((p, i) => {
      const text = p.text.replace(/\n/g, ' ').slice(0, 70);
      const linkOpen = p.url ? `<a href="${escapeHtml(p.url)}" target="_blank" rel="noopener">` : '';
      const linkClose = p.url ? '</a>' : '';
      h += `<tr>
        <td style="color:${accent};font-weight:700">#${i+1}</td>
        <td>${linkOpen}@${escapeHtml(p.author)}${linkClose}</td>
        <td class="text-cell">${escapeHtml(text)}</td>
        <td class="num">${fmt(p.likes)}</td>
        <td class="num">${fmt(p.comments)}</td>
        <td class="num">${fmt(p.reposts)}</td>
        <td class="num">${fmt(p.shares)}</td>
        <td class="num"><span style="background:${d.type_info[p.primary_type].color};color:#000;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600">${p.primary_type}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
    return h;
  }

  // 標準：只取非 Type X（A/B/C/D/E）
  const qualified30d = d.top_posts.filter(p => p.primary_type !== 'X');
  const qualified7d = (d.top_posts_7d || []).filter(p => p.primary_type !== 'X');

  // Top 10 posts — 近 N 天
  html += `<h2 class="section-title">🔥 Top 10 熱門貼文 <small>近 ${daysWindow} 天 · 排除 Type X 長尾</small></h2>`;
  if (qualified30d.length > 0) {
    html += renderPostTable(qualified30d.slice(0, 10));
  } else {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary);padding:32px">近 ${daysWindow} 天無符合標準貼文</div>`;
  }

  // Top 10 posts — 近 7 天（進階區塊）
  html += `<h2 class="section-title">⚡ 近 7 天最熱 <small>${d.total_posts_7d} 篇 · 僅列符合標準（A-E）</small></h2>`;
  if (qualified7d.length > 0) {
    html += renderPostTable(qualified7d.slice(0, 10));
  } else {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary);padding:32px">本週無符合標準貼文</div>`;
  }

  // Type distribution
  html += `<h2 class="section-title">📊 互動類型分布 <small>單篇可同時符合多型</small></h2><div class="card">`;
  const maxCount = Math.max(...Object.values(d.type_counts));
  ['A','B','C','D','E','X'].forEach(t => {
    const info = d.type_info[t];
    const cnt = d.type_counts[t];
    const pct = Math.round(cnt / d.total_posts * 100);
    const barW = maxCount ? Math.round(cnt / maxCount * 100) : 0;
    html += `<div class="type-row">
      <div class="type-badge" style="background:${info.color}">${info.emoji}</div>
      <div class="type-info">
        <div class="type-name">Type ${t}：${info.name} <span style="color:${accent}">${cnt}篇 (${pct}%)</span></div>
        <div class="type-desc">${info.desc}</div>
      </div>
      <div class="type-bar-wrap"><div class="type-bar" style="background:${info.color};width:${barW}%"></div></div>
    </div>`;
  });
  html += `</div>`;

  // Hourly distribution
  html += `<h2 class="section-title">⏰ 24 小時發文分布 <small>台北時間 GMT+8</small></h2><div class="card">`;
  const hourlyArr = Array.from({length:24}, (_,h) => d.hourly[h] || {count:0,avg_engagement:0});
  const maxH = Math.max(...hourlyArr.map(x => x.count)) || 1;
  html += `<div class="hourly">`;
  hourlyArr.forEach((h, i) => {
    const ht = Math.round(h.count / maxH * 100);
    html += `<div class="hour-bar" style="height:${ht}%;background:${accent}" data-tooltip="${i}:00 · ${h.count}篇 · 平均${Math.round(h.avg_engagement).toLocaleString()}互動"></div>`;
  });
  html += `</div><div class="hour-labels">`;
  for (let h = 0; h < 24; h++) html += `<div>${h % 3 === 0 ? h : ''}</div>`;
  html += `</div></div>`;

  // Daily distribution
  html += `<h2 class="section-title">📅 週間分布</h2><div class="card"><div class="daily">`;
  ['週一','週二','週三','週四','週五','週六','週日'].forEach(day => {
    const dd = d.daily[day] || {count:0,avg_engagement:0};
    html += `<div class="day-cell">
      <div class="label">${day}</div>
      <div class="count">${dd.count}</div>
      <div class="eng">${Math.round(dd.avg_engagement).toLocaleString()}</div>
    </div>`;
  });
  html += `</div></div>`;

  return html;
}

// Init
document.querySelectorAll('.panel').forEach(panel => {
  const topic = panel.dataset.topic;
  const accent = getComputedStyle(document.querySelector(`.tab-btn[data-topic="${topic}"]`)).getPropertyValue('--accent').trim();
  panel.innerHTML = renderPanel(topic, accent);
});

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const topic = btn.dataset.topic;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + topic).classList.add('active');
  });
});
</script>
</body>
</html>
