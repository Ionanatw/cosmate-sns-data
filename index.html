\n\n我心裡很緊張 只好開玩笑的說 不想讓我牽喔\n他很小聲說 沒有不想 \n\n我們兩個就繼續默默的走\n我現在也不知道該說什麼 就說 你耳朵很紅喔\n\n他說 朋友牽手很奇怪啦\n我腦袋很混亂 就說 誰跟你是朋友\n他愣住 表情呈現 你什麼意思", "likes": 29849, "comments": 884, "reposts": 0, "shares": 0, "total_engagement": 30733, "primary_type": "E", "types": ["E"], "comment_rate": 2.96, "share_rate": 0.0, "dt": "2026-04-19T21:41:00+08:00", "hour": 21, "weekday": "Sunday", "source": "love_2026-05-11_050256.json"}, {"author": "thatsmysheep", "url": "https://www.threads.net/@thatsmysheep/post/DXMw_NIknkc", "text": "女友每次約會完都會很認真的跟我說謝謝\n妳真的是最好的", "likes": 27973, "comments": 457, "reposts": 0, "shares": 0, "total_engagement": 28430, "primary_type": "E", "types": ["E"], "comment_rate": 1.63, "share_rate": 0.0, "dt": "2026-04-17T00:35:42+08:00", "hour": 0, "weekday": "Friday", "source": "love_2026-05-11_050256.json"}, {"author": "charlie.z.t.h", "url": "https://www.threads.net/@charlie.z.t.h/post/DXCMERrEjRv", "text": "最適合約會的漂亮飯 \n台中合輯", "likes": 23901, "comments": 1740, "reposts": 0, "shares": 0, "total_engagement": 25641, "primary_type": "C", "types": ["C"], "comment_rate": 7.28, "share_rate": 0.0, "dt": "2026-04-12T22:00:41+08:00", "hour": 22, "weekday": "Sunday", "source": "love_2026-05-11_050256.json"}, {"author": "ugly_face_time", "url": "https://www.threads.net/@ugly_face_time/post/DXTDRrtE3Wg", "text": "⠀\n⠀⠀\n⠀⠀\n⠀⠀面對面告白才是最頂的  不接受反駁 ⠀\n⠀\n⠀\n⠀", "likes": 20688, "comments": 69, "reposts": 0, "shares": 0, "total_engagement": 20757, "primary_type": "E", "types": ["E"], "comment_rate": 0.33, "share_rate": 0.0, "dt": "2026-04-19T11:10:58+08:00", "hour": 11, "weekday": "Sunday", "source": "love_2026-05-11_050256.json"}, {"author": "bean_sprout.0", "url": "https://www.threads.net/@bean_sprout.0/post/DYFOLfXmlgJ", "text": "身邊有位女同朋友在暈船\n友人：啊啊啊，學姊真的好美，味道也好香，聲音也超好聽的幹\n我：她是直的\n友人：可是她會摸我的頭叫我妹妹，還會抱我和安慰我欸\n我：幹不是…這怎麼都像是直女陷阱好不好\n友人：閉嘴啦，我又不像你被告白，我也想要有個關心我的女朋友啊\n我：她到底長怎樣才能讓你暈成這樣\n友人：給你看合照\n我現在處於一個已讀不回的狀態，那個人我熟到我甚至連她住哪裡我都一清二楚，因為他媽的那是我表姐，而且她就是個沒有半點邊界感的大直女，我現在真的不知道要怎麼回她", "likes": 19052, "comments": 155, "reposts": 0, "shares": 0, "total_engagement": 19207, "primary_type": "E", "types": ["E"], "comment_rate": 0.81, "share_rate": 0.0, "dt": "2026-05-08T22:48:16+08:00", "hour": 22, "weekday": "Friday", "source": "love_2026-05-11_050256.json"}, {"author": "7.30_xu", "url": "https://www.threads.net/@7.30_xu/post/DXn1x29E-z0", "text": "已截圖\n \n沒脫單回來提告", "likes": 18089, "comments": 105, "reposts": 0, "shares": 0, "total_engagement": 18194, "primary_type": "E", "types": ["E"], "comment_rate": 0.58, "share_rate": 0.0, "dt": "2026-04-27T12:57:04+08:00", "hour": 12, "weekday": "Monday", "source": "love_2026-05-11_050256.json"}, {"author": "oi_q140", "url": "https://www.threads.net/@oi_q140/post/DYBz1dTkUM1", "text": "今天看到很不一樣的愛情觀\n\n相愛的本質根本不是什麼價值交換，反而剛好相反。當你擁有了獨處的能力，也能搞定所有事，覺得戀愛可有可無、對另一半也沒什麼需求的時候，你才真正拿到了親密關係的入場券。\n \n因為這時候的你，是真的能用欣賞的眼光去愛一個人。你想和對方在一起的理由，不再是「你對我有用」或「我需要你來填補空虛」，而是單純看見他身上的生命力，打從心底希望這份光亮能一直燦爛下去。\n \n就像看夕陽灑在海面上、波光粼粼的那一刻，你心裡只有一個念頭：「如果這一刻能一直停住就好了」。接著你就會不自覺被吸引、想靠近，想用自己的方式去呵護他的生命力，讓它繼續發光發熱——這才是真正愛上一個人的感覺。", "likes": 18051, "comments": 136, "reposts": 0, "shares": 0, "total_engagement": 18187, "primary_type": "E", "types": ["E"], "comment_rate": 0.75, "share_rate": 0.0, "dt": "2026-05-07T15:00:20+08:00", "hour": 15, "weekday": "Thursday", "source": "love_2026-05-11_050256.json"}, {"author": "c816yy", "url": "https://www.threads.net/@c816yy/post/DXHYs6ggcjd", "text": "懂英語8大時態（暈船完整版）\n\n1.一般現在時：我每天都好想她。\n\n2.一般過去時：她昨天也好想她。\n\n3.一般將來時：我明天也會想她。\n\n4.現在進行時：我現在正在想她。\n\n5.過去進行時：昨天五點，我正在想她。\n\n6.過去將來時：我昨天說，我今天會想她。\n\n7.現在完成時：我今天已經想她一遍了。\n\n8.過去完成時：昨天放學前，我已經想過她了。", "likes": 17821, "comments": 198, "reposts": 0, "shares": 0, "total_engagement": 18019, "primary_type": "E", "types": ["E"], "comment_rate": 1.11, "share_rate": 0.0, "dt": "2026-04-14T22:27:17+08:00", "hour": 22, "weekday": "Tuesday", "source": "love_2026-05-11_050256.json"}, {"author": "dopcai22758", "url": "https://www.threads.net/@dopcai22758/post/DXb1wXJEwwG", "text": "後來我和室友 \n恩不對 現在是男朋友\n我們有好好的聊聊\n\n我才知道 他大概國中就知道自己是同性戀\n他原本還下定決心 不跟直男有瓜葛\n因為喜歡直男都沒有好下場\n\n他覺得我就是大直男 還交過2個女朋友\n他看很多喜歡直男的心得 \n覺得喜歡上我 自己完蛋了\n\n他都很努力隱藏自己的喜歡 超級怕被我發現\n\n恩 你沒有隱藏的很好 我是有察覺到的\n\n我問他是什麼時候喜歡我的\n他說是因為 之前社團活動有人拿弱勢開玩笑\n我直接說這不好笑 他就覺得我是很棒的人\n（聽到這個換我有點害羞\n\n他說我很會觀察生活的細節\n每次都會因為我 發現很多平常沒注意的東西\n就覺得自己有因為我更不一樣\n\n可是我也是因為你 整個世界截然不同 \n\n我跟他說 你可以看脆 我有寫什麼時候我覺得怪怪的\n那天你住我家 我是不是應該要抱你\n他說他那天住我家大失眠 整個人僵住 都不敢動 但有偷偷碰我的手\n我邀他來我家玩的時候 他開心到要爆掉\n\n我說 我還以為告白那時候你才要爆掉\n他說他那天腦袋直接燒掉\n而且我每次撩他 他都很害羞不知道怎麼反應 說我都欺負他這個母單\n\n我笑他說別人都是兩個人放閃 你自己一個人就可以閃瞎我", "likes": 13534, "comments": 317, "reposts": 0, "shares": 0, "total_engagement": 13851, "primary_type": "E", "types": ["E"], "comment_rate": 2.34, "share_rate": 0.0, "dt": "2026-04-22T21:05:59+08:00", "hour": 21, "weekday": "Wednesday", "source": "love_2026-05-11_050256.json"}, {"author": "lilian.9810.l", "url": "https://www.threads.net/@lilian.9810.l/post/DX2OvMOEojZ", "text": "我前任在跟我吵架的時候去嫖妓被我抓到，我對他說了一句話：你媽知道你這麼噁心嗎？\n\n他真的跑去問他媽🤣\n\n他媽媽回他：嫖妓是不太好但也沒有很嚴重，不要生病就好，你女朋友也不用得理不饒人。\n\n我當時只覺得他一家子垃圾，後來我發現，大部分的女生知道兒子劈腿、外遇的反應都差不多。", "likes": 10219, "comments": 202, "reposts": 0, "shares": 0, "total_engagement": 10421, "primary_type": "E", "types": ["E"], "comment_rate": 1.98, "share_rate": 0.0, "dt": "2026-05-03T03:04:32+08:00", "hour": 3, "weekday": "Sunday", "source": "love_2026-05-11_050256.json"}, {"author": "quq.pup1", "url": "https://www.threads.net/@quq.pup1/post/DXeTV5ik-sR", "text": "⠀\n⠀⠀\n⠀⠀\n「你真的確定他是在跟你曖昧,還是無聊時的消遣呢？ 」 ⠀\n⠀\n⠀", "likes": 9395, "comments": 181, "reposts": 0, "shares": 0, "total_engagement": 9576, "primary_type": "E", "types": ["E"], "comment_rate": 1.93, "share_rate": 0.0, "dt": "2026-04-23T20:02:59+08:00", "hour": 20, "weekday": "Thursday", "source": "love_2026-05-11_050256.json"}, {"author": "vvn.619", "url": "https://www.threads.net/@vvn.619/post/DYKAO9Dk_t5", "text": "乾我單身即將滿五年了誒⋯⋯🤩", "likes": 7920, "comments": 296, "reposts": 0, "shares": 0, "total_engagement": 8216, "primary_type": "C", "types": ["C"], "comment_rate": 3.74, "share_rate": 0.0, "dt": "2026-05-10T19:22:36+0 ime", "url": "https://www.threads.net/@ugly_face_time/post/DXTDRrtE3Wg", "text": "⠀\n⠀⠀\n⠀⠀\n⠀⠀面對面告白才是最頂的  不接受反駁 ⠀\n⠀\n⠀\n⠀", "likes": 20688, "comments": 69, "reposts": 0, "shares": 0, "total_engagement": 20757, "primary_type": "E", "types": ["E"], "comment_rate": 0.33, "share_rate": 0.0, "dt": "2026-04-19T11:10:58+08:00", "hour": 11, "weekday": "Sunday", "source": "love_2026-05-11_050256.json"}, {"author": "bean_sprout.0", "url": "https://www.threads.net/@bean_sprout.0/post/DYFOLfXmlgJ", "text": "身邊有位女同朋友在暈船\n友人：啊啊啊，學姊真的好美，味道也好香，聲音也超好聽的幹\n我：她是直的\n友人：可是她會摸我的頭叫我妹妹，還會抱我和安慰我欸\n我：幹不是…這怎麼都像是直女陷阱好不好\n友人：閉嘴啦，我又不像你被告白，我也想要有個關心我的女朋友啊\n我：她到底長怎樣才能讓你暈成這樣\n友人：給你看合照\n我現在處於一個已讀不回的狀態，那個人我熟到我甚至連她住哪裡我都一清二楚，因為他媽的那是我表姐，而且她就是個沒有半點邊界感的大直女，我現在真的不知道要怎麼回她", "likes": 19052, "comments": 155, "reposts": 0, "shares": 0, "total_engagement": 19207, "primary_type": "E", "types": ["E"], "comment_rate": 0.81, "share_rate": 0.0, "dt": "2026-05-08T22:48:16+08:00", "hour": 22, "weekday": "Friday", "source": "love_2026-05-11_050256.json"}, {"author": "7.30_xu", "url": "https://www.threads.net/@7.30_xu/post/DXn1x29E-z0", "text": "已截圖\n \n沒脫單回來提告", "likes": 18089, "comments": 105, "reposts": 0, "shares": 0, "total_engagement": 18194, "primary_type": "E", "types": ["E"], "comment_rate": 0.58, "share_rate": 0.0, "dt": "2026-04-27T12:57:04+08:00", "hour": 12, "weekday": "Monday", "source": "love_2026-05-11_050256.json"}, {"author": "oi_q140", "url": "https://www.threads.net/@oi_q140/post/DYBz1dTkUM1", "text": "今天看到很不一樣的愛情觀\n\n相愛的本質根本不是什麼價值交換，反而剛好相反。當你擁有了獨處的能力，也能搞定所有事，覺得戀愛可有可無、對另一半也沒什麼需求的時候，你才真正拿到了親密關係的入場券。\n \n因為這時候的你，是真的能用欣賞的眼光去愛一個人。你想和對方在一起的理由，不再是「你對我有用」或「我需要你來填補空虛」，而是單純看見他身上的生命力，打從心底希望這份光亮能一直燦爛下去。\n \n就像看夕陽灑在海面上、波光粼粼的那一刻，你心裡只有一個念頭：「如果這一刻能一直停住就好了」。接著你就會不自覺被吸引、想靠近，想用自己的方式去呵護他的生命力，讓它繼續發光發熱——這才是真正愛上一個人的感覺。", "likes": 18051, "comments": 136, "reposts": 0, "shares": 0, "total_engagement": 18187, "primary_type": "E", "types": ["E"], "comment_rate": 0.75, "share_rate": 0.0, "dt": "2026-05-07T15:00:20+08:00", "hour": 15, "weekday": "Thursday", "source": "love_2026-05-11_050256.json"}, {"author": "c816yy", "url": "https://www.threads.net/@c816yy/post/DXHYs6ggcjd", "text": "懂英語8大時態（暈船完整版）\n\n1.一般現在時：我每天都好想她。\n\n2.一般過去時：她昨天也好想她。\n\n3.一般將來時：我明天也會想她。\n\n4.現在進行時：我現在正在想她。\n\n5.過去進行時：昨天五點，我正在想她。\n\n6.過去將來時：我昨天說，我今天會想她。\n\n7.現在完成時：我今天已經想她一遍了。\n\n8.過去完成時：昨天放學前，我已經想過她了。", "likes": 17821, "comments": 198, "reposts": 0, "shares": 0, "total_engagement": 18019, "primary_type": "E", "types": ["E"], "comment_rate": 1.11, "share_rate": 0.0, "dt": "2026-04-14T22:27:17+08:00", "hour": 22, "weekday": "Tuesday", "source": "love_2026-05-11_050256.json"}, {"author": "dopcai22758", "url": "https://www.threads.net/@dopcai22758/post/DXb1wXJEwwG", "text": "後來我和室友 \n恩不對 現在是男朋友\n我們有好好的聊聊\n\n我才知道 他大概國中就知道自己是同性戀\n他原本還下定決心 不跟直男有瓜葛\n因為喜歡直男都沒有好下場\n\n他覺得我就是大直男 還交過2個女朋友\n他看很多喜歡直男的心得 \n覺得喜歡上我 自己完蛋了\n\n他都很努力隱藏自己的喜歡 超級怕被我發現\n\n恩 你沒有隱藏的很好 我是有察覺到的\n\n我問他是什麼時候喜歡我的\n他說是因為 之前社團活動有人拿弱勢開玩笑\n我直接說這不好笑 他就覺得我是很棒的人\n（聽到這個換我有點害羞\n\n他說我很會觀察生活的細節\n每次都會因為我 發現很多平常沒注意的東西\n就覺得自己有因為我更不一樣\n\n可是我也是因為你 整個世界截然不同 \n\n我跟他說 你可以看脆 我有寫什麼時候我覺得怪怪的\n那天你住我家 我是不是應該要抱你\n他說他那天住我家大失眠 整個人僵住 都不敢動 但有偷偷碰我的手\n我邀他來我家玩的時候 他開心到要爆掉\n\n我說 我還以為告白那時候你才要爆掉\n他說他那天腦袋直接燒掉\n而且我每次撩他 他都很害羞不知道怎麼反應 說我都欺負他這個母單\n\n我笑他說別人都是兩個人放閃 你自己一個人就可以閃瞎我", "likes": 13534, "comments": 317, "reposts": 0, "shares": 0, "total_engagement": 13851, "primary_type": "E", "types": ["E"], "comment_rate": 2.34, "share_rate": 0.0, "dt": "2026-04-22T21:05:59+08:00", "hour": 21, "weekday": "Wednesday", "source": "love_2026-05-11_050256.json"}, {"author": "lilian.9810.l", "url": "https://www.threads.net/@lilian.9810.l/post/DX2OvMOEojZ", "text": "我前任在跟我吵架的時候去嫖妓被我抓到，我對他說了一句話：你媽知道你這麼噁心嗎？\n\n他真的跑去問他媽🤣\n\n他媽媽回他：嫖妓是不太好但也沒有很嚴重，不要生病就好，你女朋友也不用得理不饒人。\n\n我當時只覺得他一家子垃圾，後來我發現，大部分的女生知道兒子劈腿、外遇的反應都差不多。", "likes": 10219, "comments": 202, "reposts": 0, "shares": 0, "total_engagement": 10421, "primary_type": "E", "types": ["E"], "comment_rate": 1.98, "share_rate": 0.0, "dt": "2026-05-03T03:04:32+08:00", "hour": 3, "weekda : 8, "weekday": "Saturday", "source": "love_2026-05-11_050256.json"}, {"author": "nn_rou", "url": "https://www.threads.net/@nn_rou/post/DYLe0zZk652", "text": "單身的人在哪？集合！\n￼我來看看有多少人單身\n順便看有沒有人脫隊脫單了", "likes": 282, "comments": 77, "reposts": 0, "shares": 0, "total_engagement": 359, "primary_type": "X", "types": ["X"], "comment_rate": 27.3, "share_rate": 0.0, "dt": "2026-05-11T09:09:09+08:00", "hour": 9, "weekday": "Monday", "source": "love_2026-05-11_050256.json"}, {"author": "yanfly1124", "url": "https://www.threads.net/@yanfly1124/post/DYJ1CAxkxId", "text": "最近沒有流量\n感覺可以當心情日記\n\n這幾天閒下來才發現\n雖然很想進入一段感情 但我好像太習慣單身了\n因為我真的只要一忙 就會很容易搞消失\n可能連我都不知道要怎麼跟我自己談戀愛\n同時顧及感情和生活的都是神人吧", "likes": 324, "comments": 10, "reposts": 0, "shares": 0, "total_engagement": 334, "primary_type": "X", "types": ["X"], "comment_rate": 3.09, "share_rate": 0.0, "dt": "2026-05-10T17:44:43+08:00", "hour": 17, "weekday": "Sunday", "source": "love_2026-05-11_050256.json"}, {"author": "yuxi_1114", "url": "https://www.threads.net/@yuxi_1114/post/DYKAylZAYJY", "text": "⚠️深層聊天是什麼\n\n彼此開始聊到「內心真正的東西」。\n\n像是：\n\n*自卑感\n*原生家庭\n*過去受過的傷\n*為什麼沒安全感\n*對愛的看法\n* 真正害怕的事\n* 以前的感情陰影\n* 對未來的焦慮\n\n這種聊天會讓人產生：\n\n「我好像被理解了。」\n\n所以很多人會突然快速暈船，\n不是因為認識很久，\n而是因為聊得太深。\n\n❤️深層聊天還有一個特點：\n\n會開始卸下「社交人格」\n\n平常大家都會：\n\n* 客套\n* 開玩笑\n* 維持形象\n\n但深聊時會變成：\n\n「我其實沒有看起來那麼快樂。」\n「我很怕被丟下。」\n「我其實很沒安全感。」\n\n這種才叫真正的靠近。\n\n⚠️為什麼深層聊天容易產生感情？\n\n因為大部分人缺的不是聊天對象，\n而是：\n\n「能理解自己的人。」\n\n所以當有人願意認真聽、接住情緒、理解內心時，\n人很容易依賴。", "likes": 314, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 314, "primary_type": "X", "types": ["X"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-05-10T19:27:28+08:00", "hour": 19, "weekday": "Sunday", "source": "love_2026-05-11_050256.json"}, {"author": "rhino.176167", "url": "https://www.threads.net/@rhino.176167/post/DYEEda-D3YS", "text": "26歲單身小帥哥也想脫單 可以嗎", "likes": 263, "comments": 9, "reposts": 0, "shares": 0, "total_engagement": 272, "primary_type": "X", "types": ["X"], "comment_rate": 3.42, "share_rate": 0.0, "dt function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmt(n) { return n.toLocaleString(); }

function fmtDate(iso) { return iso ? iso.slice(0,10) : '—'; }

function renderPanel(topic, accent) {
  const d = DATA[topic];
  if (!d) return '<p style="color:#a0a0a0;text-align:center;padding:40px;">No data</p>';

  // Hero metrics
  const top1 = d.top_posts[0];
  const daysWindow = d.days_window || 30;

  let html = `
    <div class="metrics-grid">
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${d.total_posts}</span>
        <span class="metric-label">近 ${daysWindow} 天貼文</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${d.total_posts_7d}</span>
        <span class="metric-label">近 7 天貼文</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${fmt(top1.likes)}</span>
        <span class="metric-label">最高單篇按讚</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${fmt(d.thresholds.likes_p90)}</span>
        <span class="metric-label">爆款門檻 (P90)</span>
      </div>
    </div>
  `;

  // Helper to render a post table
  function renderPostTable(posts) {
    let h = `<div class="card"><table>
      <thead><tr>
        <th>排名</th><th>用戶</th><th>內容</th>
        <th class="num">❤️</th><th class="num">💬</th><th class="num">🔁</th><th class="num">✈️</th>
        <th class="num">類型</th>
      </tr></thead><tbody>`;
    posts.forEach((p, i) => {
      const text = p.text.replace(/\n/g, ' ').slice(0, 70);
      const linkOpen = p.url ? `<a href="${escapeHtml(p.url)}" target="_blank" rel="noopener">` : '';
      const linkClose = p.url ? '</a>' : '';
      h += `<tr>
        <td style="color:${accent};font-weight:700">#${i+1}</td>
        <td>${linkOpen}@${escapeHtml(p.author)}${linkClose}</td>
        <td class="text-cell">${escapeHtml(text)}</td>
        <td class="num">${fmt(p.likes)}</td>
        <td class="num">${fmt(p.comments)}</td>
        <td class="num">${fmt(p.reposts)}</td>
        <td class="num">${fmt(p.shares)}</td>
        <td class="num"><span style="background:${d.type_info[p.primary_type].color};color:#000;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600">${p.primary_type}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
    return h;
  }

  // 標準：只取非 Type X（A/B/C/D/E）
  const qualified30d = d.top_posts.filter(p => p.primary_type !== 'X');
  const qualified7d = (d.top_posts_7d || []).filter(p => p.primary_type !== 'X');

  // Top 10 posts — 近 N 天
  html += `<h2 class="section-title">🔥 Top 10 熱門貼文 <small>近 ${daysWindow} 天 · 排除 Type X 長尾</small></h2>`;
  if (qualified30d.length > 0) {
    html += renderPostTable(qualified30d.slice(0, 10));
  } else {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary);padding:32px">近 ${daysWindow} 天無符合標準貼文</div>`;
  }

  // Top 10 posts — 近 7 天（進階區塊）
  html += `<h2 class="section-title">⚡ 近 7 天最熱 <small>${d.total_posts_7d} 篇 · 僅列符合標準（A-E）</small></h2>`;
  if (qualified7d.length > 0) {
    html += renderPostTable(qualified7d.slice(0, 10));
  } else {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary);padding:32px">本週無符合標準貼文</div>`;
  }

  // Type distribution
  html += `<h2 class="section-title">📊 互動類型分布 <small>單篇可同時符合多型</small></h2><div class="card">`;
  const maxCount = Math.max(...Object.values(d.type_counts));
  ['A','B','C','D','E','X'].forEach(t => {
    const info = d.type_info[t];
    const cnt = d.type_counts[t];
    const pct = Math.round(cnt / d.total_posts * 100);
    const barW = maxCount ? Math.round(cnt / maxCount * 100) : 0;
    html += `<div class="type-row">
      <div class="type-badge" style="background:${info.color}">${info.emoji}</div>
      <div class="type-info">
        <div class="type-name">Type ${t}：${info.name} <span style="color:${accent}">${cnt}篇 (${pct}%)</span></div>
        <div class="type-desc">${info.desc}</div>
      </div>
      <div class="type-bar-wrap"><div class="type-bar" style="background:${info.color};width:${barW}%"></div></div>
    </div>`;
  });
  html += `</div>`;

  // Hourly distribution
  html += `<h2 class="section-title">⏰ 24 小時發文分布 <small>台北時間 GMT+8</small></h2><div class="card">`;
  const hourlyArr = Array.from({length:24}, (_,h) => d.hourly[h] || {count:0,avg_engagement:0});
  const maxH = Math.max(...hourlyArr.map(x => x.count)) || 1;
  html += `<div class="hourly">`;
  hourlyArr.forEach((h, i) => {
    const ht = Math.round(h.count / maxH * 100);
    html += `<div class="hour-bar" style="height:${ht}%;background:${accent}" data-tooltip="${i}:00 · ${h.count}篇 · 平均${Math.round(h.avg_engagement).toLocaleString()}互動"></div>`;
  });
  html += `</div><div class="hour-labels">`;
  for (let h = 0; h < 24; h++) html += `<div>${h % 3 === 0 ? h : ''}</div>`;
  html += `</div></div>`;

  // Daily distribution
  html += `<h2 class="section-title">📅 週間分布</h2><div class="card"><div class="daily">`;
  ['週一','週二','週三','週四','週五','週六','週日'].forEach(day => {
    const dd = d.daily[day] || {count:0,avg_engagement:0};
    html += `<div class="day-cell">
      <div class="label">${day}</div>
      <div class="count">${dd.count}</div>
      <div class="eng">${Math.round(dd.avg_engagement).toLocaleString()}</div>
    </div>`;
  });
  html += `</div></div>`;

  // AI 洞察分析（若有）
  const insight = d.ai_insight;
  if (insight) {
    html += `<h2 class="section-title" style="margin-top:48px">🧠 AI 洞察分析</h2>`;
    html += `<div class="card" style="border-left:4px solid ${accent};padding:28px;">`;
    html += `<div style="font-size:1.2rem;font-weight:800;margin-bottom:20px;line-height:1.4;">${escapeHtml(insight.headline)}</div>`;

    (insight.patterns || []).forEach((pat, i) => {
      html += `<div style="margin-bottom:24px${i > 0 ? ';border-top:1px solid var(--glass-border);padding-top:20px' : ''}">`;
      html += `<div style="font-weight:700;font-size:1rem;margin-bottom:6px;">${['🔥','✈️','💬','❤️'][i] || '📊'} ${escapeHtml(pat.name)} <span style="color:${accent};font-size:0.85rem;font-weight:600;">${escapeHtml(pat.trigger_type)}</span></div>`;
      html += `<div style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:12px;">${escapeHtml(pat.desc)}</div>`;

      // 代表案例
      (pat.examples || []).forEach(ex => {
        html += `<div style="background:var(--bg);border-radius:10px;padding:12px 16px;margin-bottom:8px;">`;
        html += `<span style="font-weight:600;color:${accent}">${escapeHtml(ex.author)}</span>`;
        html += ` <span style="font-size:0.8rem;color:var(--text-secondary)">${escapeHtml(ex.metric)}</span><br>`;
        html += `<span style="font-size:0.88rem">「${escapeHtml(ex.text)}」</span>`;
        html += `</div>`;
      });

      // 操作要點
      html += `<div style="margin-top:10px;padding:10px 14px;background:#f8f5ee;border-radius:8px;font-size:0.85rem;">`;
      html += `<strong>操作要點：</strong>${escapeHtml(pat.actionable)}`;
      html += `</div></div>`;
    });

    // 隱藏發現
    if (insight.hidden_finding) {
      html += `<div style="margin-top:20px;padding:16px 20px;background:linear-gradient(135deg,#141413,#2a2924);color:#fff;border-radius:12px;">`;
      html += `<div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:${accent};margin-bottom:8px;">Hidden Finding</div>`;
      html += `<div style="font-size:0.95rem;line-height:1.6;">${escapeHtml(insight.hidden_finding)}</div>`;
      html += `</div>`;
    }

    html += `</div>`;
  }

  return html;
}

// Init
document.querySelectorAll('.panel').forEach(panel => {
  const topic = panel.dataset.topic;
  const accent = getComputedStyle(document.querySelector(`.tab-btn[data-topic="${topic}"]`)).getPropertyValue('--accent').trim();
  panel.innerHTML = renderPanel(topic, accent);
});

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const topic = btn.dataset.topic;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + topic).classList.add('active');
  });
});
</script>
</body>
