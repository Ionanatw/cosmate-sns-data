kes": 6562, "comments": 77, "reposts": 0, "shares": 0, "total_engagement": 6639, "primary_type": "E", "types": ["E"], "comment_rate": 1.17, "share_rate": 0.0, "dt": "2026-03-26T12:00:21+08:00", "hour": 12, "weekday": "Thursday", "source": "anime_2026-04-20_052228.json"}, {"author": "nggyu_01xd", "url": "https://www.threads.net/@nggyu_01xd/post/DXRmhRDD6nR", "text": "第二集突然15轉18\n還真的露了...", "likes": 5520, "comments": 69, "reposts": 0, "shares": 0, "total_engagement": 5589, "primary_type": "E", "types": ["E"], "comment_rate": 1.25, "share_rate": 0.0, "dt": "2026-04-18T21:40:26+08:00", "hour": 21, "weekday": "Saturday", "source": "anime_2026-04-20_052228.json"}, {"author": "judai.0831", "url": "https://www.threads.net/@judai.0831/post/DWVVYyDEuvW", "text": "妹妹發出了骨科邀請，阿奎亞的選擇是：\n(A)初戀女孩 舔小蘇打的天才童星 有馬加奈\n(B)前女友 隨時都能將你媽降靈的名偵探 黑川茜\n(C)雙胞胎妹妹 前世是你推的孩子 現在卻無時無刻想推倒你的 星野露比\n(D)萬物之母 你只要相信海 海就會幫助你 海洋\n\n相信阿奎亞下一季一定會做出正確的選擇的，恭喜最終季製作決定！究竟結局會如何呢？敬請期待🫠", "likes": 5232, "comments": 112, "reposts": 0, "shares": 0, "total_engagement": 5344, "primary_type": "E", "types": ["E"], "comment_rate": 2.14, "share_rate": 0.0, "dt": "2026-03-26T11:56:18+08:00", "hour": 11, "weekday": "Thursday", "source": "anime_2026-04-20_052228.json"}, {"author": "yueh.sy", "url": "https://www.threads.net/@yueh.sy/post/DXRcCrOCZNC", "text": "這部真的 超 級 好 看 ！！（雖然才看3集\n剛剛逛新番逛到的 看到名字覺得很酷就點進去了\n結果現在被燒到好想趕快看下一集\n好看 好笑 畫風好 這對還有夠好嗑\n近期少數我這個年紀還會被甜到在床上打滾的番\n反正就是大推特推就對了 推爛😚", "likes": 4319, "comments": 75, "reposts": 0, "shares": 0, "total_engagement": 4394, "primary_type": "E", "types": ["E"], "comment_rate": 1.74, "share_rate": 0.0, "dt": "2026-04-18T20:08:53+08:00", "hour": 20, "weekday": "Saturday", "source": "anime_2026-04-20_052228.json"}, {"author": "mr.marker.art", "url": "https://www.threads.net/@mr.marker.art/post/DW1i8elE4dF", "text": "我覺得這系列應該要很多人知道，所以分享一下\n\n台灣最近有六家動畫工作室共同製作名為《奇談島航》的選集系列，每一集都是獨立故事，同時運用不同的媒介與技法講述各種不同類型的故事。\n我很期待的是大貓工作室製作的單元三分之二，當然其他的作品也是非常讓人期待的，只希望各位可以多多注意不然看到作品在海外平台迴響但台灣沒人討論就覺得很可惜😭😭😭💔💔💔❤️❤️❤️❤️❤️❤️", "likes": 3280, "comments": 40, "reposts": 0, "shares": 0, "total_engagement": 3320, "primary_type": "E", "types": ["E"], "comment_rate": 1.22, "share_rate": 0.0, "dt": "2026-04-08T00:10:28+08:00", "hour": 0, "weekday": "Wednesday", "source": "anime_2026-04-20_052228.json"}, {"author": "yoyoyo_tv", "url": "https://www.threads.net/@yoyoyo_tv/post/DWJbr3Xkkwn", "text": "怎麼看一看突然眼眶就泛淚了😢\n用欣梅爾的視角來呈現日記內容真的太犯規了\n每一幕都有芙莉蓮的身影啊😭\n後面阿嬤翻到空白頁還一直往後翻確認\n好喜歡這個細節的小動作 看到好心疼\n阿嬤真的很想勇者小隊他們啊🥹\n\n而且最後船夫說\"妳都露出那麼寂寞的表情了\"\n就把書留給芙莉蓮 又讓我破防了\n船夫人也好暖 眼淚直接停不下來😭", "likes": 2562, "comments": 50, "reposts": 0, "shares": 0, "total_engagement": 2612, "primary_type": "E", "types": ["E"], "comment_rate": 1.95, "share_rate": 0.0, "dt": "2026-03-21T21:00:27+08:00", "hour": 21, "weekday": "Saturday", "source": "anime_2026-04-20_052228.json"}, {"author": "hellxgaze", "url": "https://www.threads.net/@hellxgaze/post/DXGEzAREsFt", "text": "天哪去年在法國ㄉme怎麼沒有買下去……\n超級美…（但是行李真的塞不下）", "likes": 2516, "comments": 22, "reposts": 0, "shares": 0, "total_engagement": 2538, "primary_type": "E", "types": ["E"], "comment_rate": 0.87, "share_rate": 0.0, "dt": "2026-04-14T10:14:07+08:00", "hour": 10, "weekday": "Tuesday", "source": "anime_2026-04-20_052228.json"}, {"author": "yuliaa.___1005", "url": "https://www.threads.net/@yuliaa.___1005/post/DXHRsnJjy7d", "text": "完全想不到不買的理由欸\n我已經尖叫10分鐘了", "likes": 2039, "comments": 25, "reposts": 0, "shares": 0, "total_engagement": 2064, "primary_type": "E", "types": ["E"], "comment_rate": 1.23, "share_rate": 0.0, "dt": "2026-04-14T21:26:05+08:00", "hour": 21, "weekday": "Tuesday", "source": "anime_2026-04-20_052228.json"}, {"author": "like.japan", "url": "https://www.threads.net/@like.japan/post/DXOE-opEyJx", "text": "題外話：動漫片頭到底是什麼鬼...動畫就動畫 漫畫就漫畫吧", "likes": 1909, "comments": 34, "reposts": 0, "shares": 0, "total_engagement": 1943, "primary_type": "E", "types": ["E"], "comment_rate": 1.78, "share_rate": 0.0, "dt": "2026-04-17T12:49:38+08:00", "hour": 12, "weekday": "Friday", "source": day", "source": "cosmate_2026-04-20_132744.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW03vWHkgV8", "text": "根據非正式統計動漫同好聊天翻車的前三原因：\n1. 不小心說了對方的雷角色\n2. 聊到爛尾劇情各有立場\n3. CP 不合直接吵起來\n所以 CosMate app 有雷點自由設定的功能 開聊前先知道彼此雷什麼 翻車率直接 -80%（數據純屬估算）\n\n填填看，直接速做張你的雷點單：", "likes": 15, "comments": 1, "reposts": 0, "shares": 0, "total_engagement": 16, "primary_type": "E", "types": ["E"], "comment_rate": 6.67, "share_rate": 0.0, "dt": "2026-04-07T17:52:56+08:00", "hour": 17, "weekday": "Tuesday", "source": "cosmate_2026-04-20_132744.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DW83RELkuRF", "text": "每次參加場次這麼大、人這麼多，剛入圈可能要靠緣分才能被看到\n我們想讓這件事變得容易一點點\n所以開發了這個給C圈和宅圈同好使用的app\n\n在首頁發一篇限時探索\n說不定會馬上和新同好展開新的緣分\n「我在現場，求破圈...」\n「一個人來的，有沒有人要一起晃晃👀」\n「攝影師到場，我要去找Coser了！！！」", "likes": 15, "comments": 0, "reposts": 0, "shares": 0, "total_engagement": 15, "primary_type": "X", "types": ["X"], "comment_rate": 0.0, "share_rate": 0.0, "dt": "2026-04-10T20:22:43+08:00", "hour": 20, "weekday": "Friday", "source": "cosmate_2026-04-20_132744.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DXHCZRREh2e", "text": "「樹洞」指的是一個可以安全傾訴秘密、抒發情感，沒有壓力去分享的地方\n這幾年跟同坑親友聊，一直覺得好需要「動漫界的樹洞」\n在別的社群上發文，多少要顧慮現實朋友的眼光\n有時怕打擾到別人，就變得很難破圈交新朋友\n\n所以才誕生出一個”動漫界的專屬樹洞”\n先匿名從新的共同話題開始聊，再決定要不要成為好友\n希望動漫同好們能有個隨時傾訴的秘密基地！！", "likes": 13, "comments": 0, "reposts": 0, "shares": 1, "total_engagement": 14, "primary_type": "B", "types": ["B", "D"], "comment_rate": 0.0, "share_rate": 7.14, "dt": "2026-04-14T19:12:22+08:00", "hour": 19, "weekday": "Tuesday", "source": "cosmate_2026-04-20_132744.json"}, {"author": "cosmatedaily", "url": "https://www.threads.com/@cosmatedaily/post/DWV-dlnkugQ", "text": "春天要來了 精選了15部春季強新番（放在留言\n你們有最期待哪部嗎？\n（我好想邊看邊聊雞鬥士", "likes": 9, "comments": 3, "reposts": 0, "shares": 0, "total_engagement": 12, "primary_type": "X", "types": ["X"], "comment_rate": 33.33, "share_rate": 0.0, "dt": "2026-03-26T17:55:13+08:00", function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmt(n) { return n.toLocaleString(); }

function fmtDate(iso) { return iso ? iso.slice(0,10) : '—'; }

function renderPanel(topic, accent) {
  const d = DATA[topic];
  if (!d) return '<p style="color:#a0a0a0;text-align:center;padding:40px;">No data</p>';

  // Hero metrics
  const top1 = d.top_posts[0];
  const daysWindow = d.days_window || 30;

  let html = `
    <div class="metrics-grid">
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${d.total_posts}</span>
        <span class="metric-label">近 ${daysWindow} 天貼文</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${d.total_posts_7d}</span>
        <span class="metric-label">近 7 天貼文</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${fmt(top1.likes)}</span>
        <span class="metric-label">最高單篇按讚</span>
      </div>
      <div class="metric-card">
        <span class="metric-value" style="color:${accent}">${fmt(d.thresholds.likes_p90)}</span>
        <span class="metric-label">爆款門檻 (P90)</span>
      </div>
    </div>
  `;

  // Helper to render a post table
  function renderPostTable(posts) {
    let h = `<div class="card"><table>
      <thead><tr>
        <th>排名</th><th>用戶</th><th>內容</th>
        <th class="num">❤️</th><th class="num">💬</th><th class="num">🔁</th><th class="num">✈️</th>
        <th class="num">類型</th>
      </tr></thead><tbody>`;
    posts.forEach((p, i) => {
      const text = p.text.replace(/\n/g, ' ').slice(0, 70);
      const linkOpen = p.url ? `<a href="${escapeHtml(p.url)}" target="_blank" rel="noopener">` : '';
      const linkClose = p.url ? '</a>' : '';
      h += `<tr>
        <td style="color:${accent};font-weight:700">#${i+1}</td>
        <td>${linkOpen}@${escapeHtml(p.author)}${linkClose}</td>
        <td class="text-cell">${escapeHtml(text)}</td>
        <td class="num">${fmt(p.likes)}</td>
        <td class="num">${fmt(p.comments)}</td>
        <td class="num">${fmt(p.reposts)}</td>
        <td class="num">${fmt(p.shares)}</td>
        <td class="num"><span style="background:${d.type_info[p.primary_type].color};color:#000;padding:2px 8px;border-radius:4px;font-size:0.75rem;font-weight:600">${p.primary_type}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
    return h;
  }

  // 標準：只取非 Type X（A/B/C/D/E）
  const qualified30d = d.top_posts.filter(p => p.primary_type !== 'X');
  const qualified7d = (d.top_posts_7d || []).filter(p => p.primary_type !== 'X');

  // Top 10 posts — 近 N 天
  html += `<h2 class="section-title">🔥 Top 10 熱門貼文 <small>近 ${daysWindow} 天 · 排除 Type X 長尾</small></h2>`;
  if (qualified30d.length > 0) {
    html += renderPostTable(qualified30d.slice(0, 10));
  } else {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary);padding:32px">近 ${daysWindow} 天無符合標準貼文</div>`;
  }

  // Top 10 posts — 近 7 天（進階區塊）
  html += `<h2 class="section-title">⚡ 近 7 天最熱 <small>${d.total_posts_7d} 篇 · 僅列符合標準（A-E）</small></h2>`;
  if (qualified7d.length > 0) {
    html += renderPostTable(qualified7d.slice(0, 10));
  } else {
    html += `<div class="card" style="text-align:center;color:var(--text-secondary);padding:32px">本週無符合標準貼文</div>`;
  }

  // Type distribution
  html += `<h2 class="section-title">📊 互動類型分布 <small>單篇可同時符合多型</small></h2><div class="card">`;
  const maxCount = Math.max(...Object.values(d.type_counts));
  ['A','B','C','D','E','X'].forEach(t => {
    const info = d.type_info[t];
    const cnt = d.type_counts[t];
    const pct = Math.round(cnt / d.total_posts * 100);
    const barW = maxCount ? Math.round(cnt / maxCount * 100) : 0;
    html += `<div class="type-row">
      <div class="type-badge" style="background:${info.color}">${info.emoji}</div>
      <div class="type-info">
        <div class="type-name">Type ${t}：${info.name} <span style="color:${accent}">${cnt}篇 (${pct}%)</span></div>
        <div class="type-desc">${info.desc}</div>
      </div>
      <div class="type-bar-wrap"><div class="type-bar" style="background:${info.color};width:${barW}%"></div></div>
    </div>`;
  });
  html += `</div>`;

  // Hourly distribution
  html += `<h2 class="section-title">⏰ 24 小時發文分布 <small>台北時間 GMT+8</small></h2><div class="card">`;
  const hourlyArr = Array.from({length:24}, (_,h) => d.hourly[h] || {count:0,avg_engagement:0});
  const maxH = Math.max(...hourlyArr.map(x => x.count)) || 1;
  html += `<div class="hourly">`;
  hourlyArr.forEach((h, i) => {
    const ht = Math.round(h.count / maxH * 100);
    html += `<div class="hour-bar" style="height:${ht}%;background:${accent}" data-tooltip="${i}:00 · ${h.count}篇 · 平均${Math.round(h.avg_engagement).toLocaleString()}互動"></div>`;
  });
  html += `</div><div class="hour-labels">`;
  for (let h = 0; h < 24; h++) html += `<div>${h % 3 === 0 ? h : ''}</div>`;
  html += `</div></div>`;

  // Daily distribution
  html += `<h2 class="section-title">📅 週間分布</h2><div class="card"><div class="daily">`;
  ['週一','週二','週三','週四','週五','週六','週日'].forEach(day => {
    const dd = d.daily[day] || {count:0,avg_engagement:0};
    html += `<div class="day-cell">
      <div class="label">${day}</div>
      <div class="count">${dd.count}</div>
      <div class="eng">${Math.round(dd.avg_engagement).toLocaleString()}</div>
    </div>`;
  });
  html += `</div></div>`;

  // AI 洞察分析（若有）
  const insight = d.ai_insight;
  if (insight) {
    html += `<h2 class="section-title" style="margin-top:48px">🧠 AI 洞察分析</h2>`;
    html += `<div class="card" style="border-left:4px solid ${accent};padding:28px;">`;
    html += `<div style="font-size:1.2rem;font-weight:800;margin-bottom:20px;line-height:1.4;">${escapeHtml(insight.headline)}</div>`;

    (insight.patterns || []).forEach((pat, i) => {
      html += `<div style="margin-bottom:24px${i > 0 ? ';border-top:1px solid var(--glass-border);padding-top:20px' : ''}">`;
      html += `<div style="font-weight:700;font-size:1rem;margin-bottom:6px;">${['🔥','✈️','💬','❤️'][i] || '📊'} ${escapeHtml(pat.name)} <span style="color:${accent};font-size:0.85rem;font-weight:600;">${escapeHtml(pat.trigger_type)}</span></div>`;
      html += `<div style="color:var(--text-secondary);font-size:0.9rem;margin-bottom:12px;">${escapeHtml(pat.desc)}</div>`;

      // 代表案例
      (pat.examples || []).forEach(ex => {
        html += `<div style="background:var(--bg);border-radius:10px;padding:12px 16px;margin-bottom:8px;">`;
        html += `<span style="font-weight:600;color:${accent}">${escapeHtml(ex.author)}</span>`;
        html += ` <span style="font-size:0.8rem;color:var(--text-secondary)">${escapeHtml(ex.metric)}</span><br>`;
        html += `<span style="font-size:0.88rem">「${escapeHtml(ex.text)}」</span>`;
        html += `</div>`;
      });

      // 操作要點
      html += `<div style="margin-top:10px;padding:10px 14px;background:#f8f5ee;border-radius:8px;font-size:0.85rem;">`;
      html += `<strong>操作要點：</strong>${escapeHtml(pat.actionable)}`;
      html += `</div></div>`;
    });

    // 隱藏發現
    if (insight.hidden_finding) {
      html += `<div style="margin-top:20px;padding:16px 20px;background:linear-gradient(135deg,#141413,#2a2924);color:#fff;border-radius:12px;">`;
      html += `<div style="font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:${accent};margin-bottom:8px;">Hidden Finding</div>`;
      html += `<div style="font-size:0.95rem;line-height:1.6;">${escapeHtml(insight.hidden_finding)}</div>`;
      html += `</div>`;
    }

    html += `</div>`;
  }

  return html;
}

// Init
document.querySelectorAll('.panel').forEach(panel => {
  const topic = panel.dataset.topic;
  const accent = getComputedStyle(document.querySelector(`.tab-btn[data-topic="${topic}"]`)).getPropertyValue('--accent').trim();
  panel.innerHTML = renderPanel(topic, accent);
});

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const topic = btn.dataset.topic;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + topic).classList.add('active');
  });
});
</script>
</body>
</html>
